spring.application.name=pos
spring.datasource.url=jdbc:h2:file:./data/posdb6;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
# Same JVM working directory as H2 `./data/posdb1` — avoids missing files when cwd differs from `./` resolution.
app.food-picture-upload-dir=${user.dir}/data/food-pictures
app.food-picture-max-bytes=5242880
app.zone-picture-upload-dir=${user.dir}/data/zone-pictures
app.zone-picture-max-bytes=5242880
app.kitchen-default-file=classpath:defaults/kitchens.txt
app.food-category-default-file=classpath:defaults/food-categories.txt
app.zone-default-file=classpath:defaults/zones.txt
app.table-default-file=classpath:defaults/tables.txt
app.food-default-file=classpath:defaults/foods.txt
# Epson TM-T82 (etc.) raw ESC/POS over TCP — default port 9100. Set enabled=true and printer IP.
app.receipt-printer.enabled=false
app.receipt-printer.host=
app.receipt-printer.port=9100
app.receipt-printer.connect-timeout-ms=5000
app.receipt-printer.read-timeout-ms=5000
app.backup-dir=${user.dir}/data/backups
