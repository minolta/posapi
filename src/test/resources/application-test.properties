# Profile "test": isolated DB so schema matches entities (avoid stale file DB / AUTO_SERVER).
spring.datasource.url=jdbc:h2:mem:postest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
app.jwt.secret=test-jwt-secret-at-least-32-characters-long
app.jwt.expiration-ms=3600000
app.auth.default-admin.enabled=false
